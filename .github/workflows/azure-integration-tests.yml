name: Azure Integration Tests

on:
  # Live Azure integration tests provision real infrastructure and take 45+ minutes, and they
  # are brittle to upstream Azure platform retirements. Rather than block every PR, they run on
  # a weekly schedule and on demand. Per-PR Azure coverage is provided by azure-tests.yml (build,
  # compile-check of test/azure, and modules/azure unit tests with SDK fakes), which needs no
  # Azure credentials. See OSS-3436.
  schedule:
    - cron: '0 6 * * 1' # Mondays at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: azure-integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  azure-integration-tests:
    name: Azure Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          version: 2025.12.10
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go modules
        run: go mod download

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Azure integration tests
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          set -o pipefail
          mkdir -p /tmp/logs
          # Scope: OIDC-compatible examples only (AzureRM provider >= 3.7).
          # Examples on AzureRM 2.x cannot authenticate via OIDC and are
          # gated behind a follow-up provider-upgrade effort.
          go test -v -p 1 -tags azure -count=1 -timeout 45m \
            -run '^(TestTerraformAzureContainerAppExample|TestTerraformAzureKeyVaultExample)$' \
            ./test/azure/... 2>&1 | tee /tmp/logs/azure-integration-tests.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-integration-test-logs
          path: /tmp/logs/
          retention-days: 14
