name: Update Terragrunt Pin

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-terragrunt-pin:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Resolve latest Terragrunt release
      id: resolve
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        latest=$(gh api repos/gruntwork-io/terragrunt/releases/latest --jq '.tag_name' | sed 's/^v//')
        current=$(sed -nE 's/^terragrunt = "([^"]+)".*/\1/p' mise.toml)
        echo "latest=${latest}" >> "$GITHUB_OUTPUT"
        echo "current=${current}" >> "$GITHUB_OUTPUT"
        echo "Current: ${current}"
        echo "Latest:  ${latest}"

    - name: Update mise.toml
      if: steps.resolve.outputs.latest != steps.resolve.outputs.current
      run: |
        set -euo pipefail
        sed -i -E 's/^(terragrunt = ")[^"]+(")/\1${{ steps.resolve.outputs.latest }}\2/' mise.toml
        grep '^terragrunt' mise.toml

    - name: Create Pull Request
      if: steps.resolve.outputs.latest != steps.resolve.outputs.current
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: bump Terragrunt pin to ${{ steps.resolve.outputs.latest }}"
        title: "chore: bump Terragrunt pin to ${{ steps.resolve.outputs.latest }}"
        body: |
          Bumps the pinned Terragrunt version in `mise.toml` from `${{ steps.resolve.outputs.current }}` to `${{ steps.resolve.outputs.latest }}`.

          Release notes: https://github.com/gruntwork-io/terragrunt/releases/tag/v${{ steps.resolve.outputs.latest }}

          This is an automated PR created by the update-terragrunt-pin workflow.
        branch: update-terragrunt-pin
        delete-branch: true
